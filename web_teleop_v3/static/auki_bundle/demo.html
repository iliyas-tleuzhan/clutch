<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>clutch — demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0a; --surface: #111; --border: #222; --muted: #555;
      --hand: #6dfaaa;
    }
    body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif;
           height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    header { display: flex; align-items: center; justify-content: flex-start;
             padding: 16px 28px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .logo {
      font-family: 'Unbounded', sans-serif; font-weight: 900; font-size: 16px;
      color: inherit; text-decoration: none; cursor: pointer;
    }
    .logo:hover { opacity: 0.88; }

    /* Full-viewport stage (Cursor-like toggles resize insets) */
    #stage {
      --panel-w: 0px;
      --terminal-h: 0px;
      flex: 1;
      position: relative;
      min-height: 0;
      overflow: hidden;
    }
    #stage.panel-open { --panel-w: 360px; }
    #stage.terminal-open { --terminal-h: min(300px, 40vh); }

    /* 3D viewer */
    #viewer {
      background: #0a0a0a;
      position: absolute;
      left: 0;
      top: 0;
      right: var(--panel-w);
      bottom: var(--terminal-h);
      transition: right 0.22s ease, bottom 0.22s ease;
      will-change: right, bottom;
    }
    #three-canvas { width: 100%; height: 100%; display: block; }

    /* Hand / camera — glass card, bottom-left */
    #hand-live-dock {
      position: absolute;
      left: 12px;
      bottom: 12px;
      width: min(288px, 44vw);
      max-height: calc(100% - 24px);
      z-index: 8;
      background: rgba(18, 22, 20, 0.82);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(109, 250, 170, 0.22);
      padding: 10px 10px 8px;
      border-radius: 12px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    #hand-live-dock.tracking {
      border-color: rgba(109, 250, 170, 0.45);
      box-shadow: 0 12px 44px rgba(40, 90, 60, 0.35);
    }
    .hand-dock-title {
      font-family: 'Unbounded', sans-serif;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--hand);
      margin-bottom: 6px;
      line-height: 1.3;
      flex-shrink: 0;
    }
    .hand-dock-robot {
      font-size: 8px;
      letter-spacing: 0.04em;
      color: rgba(160, 200, 170, 0.85);
      margin-top: 6px;
      min-height: 12px;
      line-height: 1.3;
      flex-shrink: 0;
    }

    /* Right activity rail (toggle controls) */
    .activity-rail {
      position: absolute;
      top: 0;
      right: calc(var(--panel-w) + 8px);
      bottom: var(--terminal-h);
      width: 36px;
      z-index: 18;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      pointer-events: none;
      transition: right 0.22s ease, bottom 0.22s ease;
    }
    .activity-rail button {
      pointer-events: auto;
      width: 30px;
      height: 30px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: rgba(14, 14, 14, 0.92);
      color: #888;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .activity-rail button:hover { color: #fff; border-color: #444; }
    .activity-rail button.on { color: var(--hand); border-color: rgba(109, 250, 170, 0.45); background: rgba(20, 32, 26, 0.95); }

    /* Bottom terminal tab */
    .terminal-tab {
      position: absolute;
      left: 50%;
      bottom: var(--terminal-h);
      transform: translate(-50%, 0);
      z-index: 19;
      pointer-events: none;
      transition: bottom 0.22s ease;
    }
    .terminal-tab button {
      pointer-events: auto;
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      background: rgba(12, 12, 12, 0.95);
      color: #777;
      font-family: ui-monospace, monospace;
      font-size: 10px;
      padding: 6px 16px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .terminal-tab button:hover { color: #b8f0b8; }
    #stage.terminal-open .terminal-tab button { color: #9fdf9f; border-color: #2a4a2a; }

    /* Right drawer: motors */
    #drawer-controls {
      position: absolute;
      top: 0;
      right: 0;
      bottom: var(--terminal-h);
      width: var(--panel-w);
      background: #0c0c0c;
      border-left: 1px solid var(--border);
      z-index: 17;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
      transition: width 0.22s ease, bottom 0.22s ease;
      box-shadow: -12px 0 40px rgba(0, 0, 0, 0.35);
    }
    #stage:not(.panel-open) #drawer-controls { pointer-events: none; border: none; box-shadow: none; overflow: hidden; }
    #stage.panel-open #drawer-controls { pointer-events: auto; }
    .drawer-head {
      flex-shrink: 0;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'Unbounded', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .drawer-head button {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      padding: 0 4px;
    }
    .drawer-head button:hover { color: #fff; }
    .drawer-head #drawer-title {
      max-width: calc(100% - 28px);
      line-height: 1.35;
    }
    #drawer-controls.hand-tracking-active .drawer-head #drawer-title {
      font-size: 9px;
      letter-spacing: 0.07em;
      text-transform: none;
      color: rgba(109, 250, 170, 0.95);
    }
    .drawer-scroll {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Bottom drawer: letter board */
    #drawer-terminal {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--terminal-h);
      background: #050805;
      border-top: 1px solid #1f2f1f;
      z-index: 16;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      transition: height 0.22s ease;
      font-family: ui-monospace, "Cascadia Code", "SF Mono", Menlo, monospace;
    }
    #stage:not(.terminal-open) #drawer-terminal { pointer-events: none; overflow: hidden; }
    #stage.terminal-open #drawer-terminal { pointer-events: auto; }
    #drawer-terminal .lb-head {
      flex-shrink: 0;
      padding: 6px 12px;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #4a6a4a;
      border-bottom: 1px solid #151515;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #drawer-terminal #board-lines {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px 10px;
      font-size: 11px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-all;
      color: #9fdf9f;
    }
    #board-lines .board-line { color: #b8f0b8; }
    #board-lines .board-line.warn { color: #e0c080; }
    .v-label { position: absolute; top: 14px; left: 18px;
               font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }

    /* Motor panel (inside drawer) — fills drawer height */
    #motors {
      background: transparent;
      padding: 12px 14px 14px;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .panel-hd {
      font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px; flex-shrink: 0;
    }
    #motor-list {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      gap: 2px;
    }
    .mrow {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .mrow-top { display: flex; justify-content: space-between;
                font-size: 10px; color: #777; margin-bottom: 4px; }
    .mrow-val { font-family: 'Unbounded', sans-serif; font-size: 10px; color: #fff; }
    .mbar-bg { height: 2px; background: var(--border); border-radius: 1px; flex-shrink: 0; }
    .mbar    { height: 2px; background: #fff; border-radius: 1px; width: 50%; transition: width .08s; }
    .home-btn {
      width: 100%;
      margin-top: 12px;
      flex-shrink: 0;
      padding: 10px; background: none;
      border: 1px solid var(--border); color: #fff; cursor: pointer;
      font-family: 'Unbounded', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .home-btn:hover { background: #fff; color: #000; }

    /* shared btn */
    .btn { padding: 9px 14px; border: 1px solid var(--border); background: none;
           color: #fff; cursor: pointer; font-family: 'Unbounded', sans-serif;
           font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
           transition: all .15s; }
    .btn:hover, .btn.on { background: #fff; color: #000; border-color: #fff; }
    .btn-row { display: flex; gap: 8px; }
    .btn-row .btn { flex: 1; }
    #bh-toggle {
      width: 100%;
      margin-top: 8px;
      flex-shrink: 0;
    }
    #bh-toggle.on {
      background: rgba(180, 60, 60, 0.25);
      border-color: rgba(255, 120, 120, 0.5);
      color: #ffb0b0;
    }
    #bh-toggle.on:hover {
      background: #c44;
      color: #fff;
      border-color: #e66;
    }

    .bh-video-wrap {
      position: relative;
      width: 100%;
      flex-shrink: 0;
      background: #000;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      max-height: min(120px, 22vh);
    }
    #browser-hand-video, #browser-hand-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #browser-hand-canvas { pointer-events: none; }
    .bh-stats-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      font-size: 9px;
      color: var(--muted);
      margin-top: 6px;
      flex-shrink: 0;
    }
    .bh-live { color: var(--hand); font-family: 'Unbounded', sans-serif; font-size: 8px; }
    .bh-motors-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px 10px;
      margin-top: 6px;
      flex-shrink: 0;
    }
    .bh-mcell {
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      gap: 2px 6px;
      align-items: center;
      font-size: 8px;
      line-height: 1.15;
      color: rgba(170, 200, 180, 0.9);
    }
    .bh-mcell .bh-mlab {
      color: var(--muted);
      letter-spacing: 0.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bh-mcell .bh-mval {
      font-family: 'Unbounded', sans-serif;
      font-size: 8px;
      color: rgba(220, 245, 228, 0.98);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .bh-mcell .bh-mbar-bg {
      grid-column: 1 / -1;
      height: 2px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 1px;
      overflow: hidden;
    }
    .bh-mcell .bh-mbar {
      height: 100%;
      width: 50%;
      background: rgba(109, 250, 170, 0.65);
      border-radius: 1px;
      transition: width 0.08s;
    }

  </style>
</head>
<body>
<header>
  <a class="logo" href="/" title="Home">CLUTCH</a>
</header>

<div id="stage">
  <div id="viewer">
    <canvas id="three-canvas"></canvas>
    <div class="v-label">SO-101 Digital Twin</div>
    <div id="hand-live-dock" onclick="event.stopPropagation()">
      <div class="hand-dock-title" id="bh-dock-title">Hand → arm</div>
      <div class="bh-video-wrap">
        <video id="browser-hand-video" playsinline muted></video>
        <canvas id="browser-hand-canvas" width="640" height="480"></canvas>
      </div>
      <div class="bh-stats-row">
        <span class="bh-live" id="bh-fps">—</span>
        <span id="bh-detect">off</span>
      </div>
      <div class="bh-motors-grid" id="bh-motors-grid" aria-label="Motor preview"></div>
      <button type="button" class="btn" id="bh-toggle">Camera</button>
      <div class="hand-dock-robot" id="bh-robot-line">Twin idle — tap Camera</div>
    </div>
  </div>

  <div class="activity-rail" aria-label="Panel toggles">
    <button type="button" id="btn-toggle-panel" title="Controls (⌘B)">≡</button>
    <button type="button" id="btn-toggle-terminal" title="Output (⌘J)">▤</button>
  </div>

  <div class="terminal-tab">
    <button type="button" id="btn-terminal-tab" title="Toggle output">OUTPUT</button>
  </div>

  <aside id="drawer-controls" aria-label="Controls panel">
    <div class="drawer-head">
      <span id="drawer-title">Controls</span>
      <button type="button" id="btn-close-panel" aria-label="Close">×</button>
    </div>
    <div class="drawer-scroll">
      <div id="motors">
        <div class="panel-hd">Motor positions</div>
        <div id="motor-list"></div>
        <button class="home-btn" onclick="sendMsg({type:'home'})">Go home</button>
      </div>
    </div>
  </aside>

  <div id="drawer-terminal" aria-live="polite">
    <div class="lb-head">
      <span>Output</span>
      <span style="letter-spacing:0.08em;color:#3a5a3a;font-size:8px">⌘J</span>
    </div>
    <div id="board-lines"></div>
  </div>
</div>

<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const LABELS  = ['Base Yaw','Shoulder','Elbow','Forearm Roll','Wrist Pitch','Gripper'];
const LIMITS  = [[-70,70],[-55,80],[-100,100],[-120,120],[-90,90],[0,90]];
const HOME    = [0, 0, 0, 0, 0, 5];

let motors  = [...HOME];
let cfgMotors = LIMITS;
window.getDemoMotors = () => motors;

// ─── WebSocket ────────────────────────────────────────────────────────────────
let ws;
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');
  ws.onopen  = () => {};
  ws.onclose = () => { setTimeout(connectWS, 2000); };
  ws.onerror = () => {};
  ws.onmessage = e => {
    const d = JSON.parse(e.data);
    if (d.type === 'state' && d.config) {
      cfgMotors = d.config.motors.map(m => [m.min, m.max]);
      window.__demoMotorLimits = cfgMotors.map(r => [...r]);
      if (typeof d.hand_udp_port === 'number') {
        window.__handUdpPort = d.hand_udp_port;
      }
    }
    if (d.type === 'board' && d.text) {
      appendBoardLine(d.text);
    }
    if (d.type === 'motors' || d.type === 'state') {
      motors = d.motors;
      syncUrdfMotors(motors);
      updateMotors();
    }
  };
}

const boardEl = () => document.getElementById('board-lines');
const MAX_BOARD = 500;
function appendBoardLine(text, cls) {
  const wrap = boardEl();
  if (!wrap) return;
  const line = document.createElement('div');
  line.className = 'board-line' + (cls ? ' ' + cls : '');
  line.textContent = text;
  wrap.appendChild(line);
  wrap.scrollTop = wrap.scrollHeight;
  while (wrap.children.length > MAX_BOARD) wrap.removeChild(wrap.firstChild);
}
function _ts() {
  const d = new Date();
  return d.toTimeString().slice(0, 8) + '.' + String(d.getMilliseconds()).padStart(3, '0');
}

connectWS();
appendBoardLine(_ts() + '  LOCAL    ⌘B Controls · ⌘J Output · camera: glass card on 3D view');

function sendMsg(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}
window.__demoSendMsg = sendMsg;
window.__demoAppendBoard = appendBoardLine;
window.__demoMotorLimits = LIMITS.map(r => [...r]);

const stage = document.getElementById('stage');
const btnTogglePanel = document.getElementById('btn-toggle-panel');
const btnClosePanel = document.getElementById('btn-close-panel');
const btnToggleTerminal = document.getElementById('btn-toggle-terminal');
const btnTerminalTab = document.getElementById('btn-terminal-tab');

function setPanelOpen(on) {
  if (!stage || !btnTogglePanel) return;
  stage.classList.toggle('panel-open', !!on);
  btnTogglePanel.classList.toggle('on', !!on);
}
function setTerminalOpen(on) {
  if (!stage || !btnToggleTerminal) return;
  stage.classList.toggle('terminal-open', !!on);
  btnToggleTerminal.classList.toggle('on', !!on);
  if (btnTerminalTab) btnTerminalTab.classList.toggle('on', !!on);
}

if (btnTogglePanel) btnTogglePanel.addEventListener('click', () => setPanelOpen(!stage.classList.contains('panel-open')));
if (btnClosePanel) btnClosePanel.addEventListener('click', () => setPanelOpen(false));
if (btnToggleTerminal) btnToggleTerminal.addEventListener('click', () => setTerminalOpen(!stage.classList.contains('terminal-open')));
if (btnTerminalTab) btnTerminalTab.addEventListener('click', () => setTerminalOpen(!stage.classList.contains('terminal-open')));

document.addEventListener('keydown', (e) => {
  if (!stage) return;
  const tag = (e.target && e.target.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (e.key === 'Escape') {
    setPanelOpen(false);
    setTerminalOpen(false);
    return;
  }
  const mod = e.metaKey || e.ctrlKey;
  if (!mod) return;
  const k = e.key.toLowerCase();
  if (k === 'b') {
    e.preventDefault();
    setPanelOpen(!stage.classList.contains('panel-open'));
  }
  if (k === 'j') {
    e.preventDefault();
    setTerminalOpen(!stage.classList.contains('terminal-open'));
  }
});

// ─── Motor Panel ──────────────────────────────────────────────────────────────
const motorList = document.getElementById('motor-list');
const BH_GRID_LABELS = ['Base', 'Shldr', 'Elbow', 'Roll', 'Wrist', 'Grip'];
const bhMotorsGrid = document.getElementById('bh-motors-grid');
LABELS.forEach((lbl, i) => {
  motorList.innerHTML += `
    <div class="mrow">
      <div class="mrow-top"><span>${lbl}</span><span class="mrow-val" id="mv${i}">0.0°</span></div>
      <div class="mbar-bg"><div class="mbar" id="mb${i}"></div></div>
    </div>`;
});
if (bhMotorsGrid) {
  bhMotorsGrid.innerHTML = BH_GRID_LABELS.map(
    (lbl, i) => `
    <div class="bh-mcell">
      <span class="bh-mlab">${lbl}</span>
      <span class="bh-mval" id="bh-dv${i}">0°</span>
      <div class="bh-mbar-bg"><div class="bh-mbar" id="bh-db${i}"></div></div>
    </div>`,
  ).join('');
}

/** Hand dock + drawer chrome while browser camera teleop is active */
window.__setHandTrackingActive = function (on) {
  const aside = document.getElementById('drawer-controls');
  if (aside) aside.classList.toggle('hand-tracking-active', !!on);
  const head = document.getElementById('drawer-title');
  if (head) head.textContent = on ? 'Hand tracking in progress…' : 'Controls';
  const dock = document.getElementById('hand-live-dock');
  if (dock) dock.classList.toggle('tracking', !!on);
  const bhTitle = document.getElementById('bh-dock-title');
  if (bhTitle) bhTitle.textContent = on ? 'Hand tracking in progress…' : 'Hand → arm';
  const toggle = document.getElementById('bh-toggle');
  if (toggle) {
    toggle.textContent = on ? 'Stop' : 'Camera';
    toggle.classList.toggle('on', !!on);
    toggle.disabled = false;
  }
};

function updateMotors() {
  motors.forEach((v, i) => {
    const el = document.getElementById('mv' + i);
    if (el) el.textContent = v.toFixed(1) + '°';
    const [lo, hi] = cfgMotors[i] || LIMITS[i];
    const pct = (((v - lo) / (hi - lo)) * 100).toFixed(1) + '%';
    const mb = document.getElementById('mb' + i);
    if (mb) mb.style.width = pct;
    const bhd = document.getElementById('bh-db' + i);
    const bhv = document.getElementById('bh-dv' + i);
    if (bhv) bhv.textContent = v.toFixed(0) + '°';
    if (bhd) bhd.style.width = pct;
  });
}
updateMotors();

/** SO-101 URDF from TheRobotStudio/SO-ARM100 (same arm family as Hugging Face LeRobot SO-101). */
function syncUrdfMotors(deg) {
  const robot = window.__so101Robot;
  if (!robot || typeof robot.setJointValue !== "function") return;
  const r = Math.PI / 180;
  robot.setJointValue("shoulder_pan", deg[0] * r);
  robot.setJointValue("shoulder_lift", deg[1] * r);
  robot.setJointValue("elbow_flex", deg[2] * r);
  robot.setJointValue("wrist_roll", deg[3] * r);
  robot.setJointValue("wrist_flex", deg[4] * r);
  const g = deg[5] * r;
  robot.setJointValue("gripper", Math.max(-0.175, Math.min(1.75, g)));
}
window.syncUrdfMotors = syncUrdfMotors;

/** Immediate twin + sliders update from browser hand (client clamp = server config limits). */
function applyHandMotorsToRobot(deg) {
  if (!Array.isArray(deg) || deg.length !== 6) return;
  motors = deg.map((v, i) => {
    const pair = cfgMotors[i] || LIMITS[i];
    const lo = pair[0];
    const hi = pair[1];
    return Math.max(lo, Math.min(hi, v));
  });
  syncUrdfMotors(motors);
  updateMotors();
}
window.__applyHandMotorsToRobot = applyHandMotorsToRobot;

syncUrdfMotors(motors);
</script>

<script type="module" src="/static/auki_bundle/hand-browser-teleop.js"></script>

<script type="module">
import * as THREE from "https://esm.sh/three@0.160.0";
import { OrbitControls } from "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js";
import URDFLoader from "https://esm.sh/urdf-loader@0.12.6?deps=three@0.160.0";

/** Official SO-101 simulation assets (STL + URDF) — LeRobot-compatible hardware. */
const URDF_URL =
  "https://raw.githubusercontent.com/TheRobotStudio/SO-ARM100/main/Simulation/SO101/so101_new_calib.urdf";

const canvas = document.getElementById("three-canvas");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d0d);

scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const key = new THREE.DirectionalLight(0xffffff, 0.85);
key.position.set(2.5, 4, 3);
scene.add(key);
const fill = new THREE.DirectionalLight(0xaaccff, 0.25);
fill.position.set(-2, 1, -2);
scene.add(fill);

let groundGrid = null;

const cam = new THREE.PerspectiveCamera(38, 1, 0.001, 50);
const orbit = new OrbitControls(cam, renderer.domElement);
orbit.enableDamping = true;
orbit.dampingFactor = 0.11;
/* Trackpad pinch → tiny wheel steps; needs a high multiplier to feel responsive. */
orbit.zoomSpeed = 8.5;
orbit.rotateSpeed = 1.05;
orbit.panSpeed = 1.05;
orbit.target.set(0, 0.15, 0);

const vLabel = document.querySelector(".v-label");
vLabel.textContent = "Loading SO-101 mesh (LeRobot / RobotStudio)…";

const loader = new URDFLoader();
loader.load(
  URDF_URL,
  (robot) => {
    window.__so101Robot = robot;
    robot.rotation.x = -Math.PI / 2;
    robot.scale.set(1, 1, 1);
    robot.traverse((c) => {
      if (c.isMesh) {
        c.castShadow = true;
        c.receiveShadow = true;
      }
    });
    scene.add(robot);

    const center = new THREE.Vector3();
    const size = new THREE.Vector3();
    let fitAttempts = 0;
    const maxFitAttempts = 50;

    function fitCameraToRobot() {
      fitAttempts += 1;
      robot.updateMatrixWorld(true);
      const box = new THREE.Box3().setFromObject(robot);
      if (box.isEmpty()) {
        if (fitAttempts < maxFitAttempts) {
          requestAnimationFrame(fitCameraToRobot);
        } else {
          vLabel.textContent = "SO-101 — meshes did not load (network / CORS)";
        }
        return;
      }

      box.getCenter(center);
      box.getSize(size);
      const maxDim = Math.max(size.x, size.y, size.z, 1e-5);
      const targetSpan = 0.78;
      robot.scale.setScalar(targetSpan / maxDim);
      robot.updateMatrixWorld(true);

      box.setFromObject(robot);
      box.getCenter(center);
      box.getSize(size);
      const maxD = Math.max(size.x, size.y, size.z, 1e-5);

      if (groundGrid) scene.remove(groundGrid);
      groundGrid = new THREE.GridHelper(maxD * 2.5, 18, 0x2c2c2c, 0x181818);
      groundGrid.position.set(center.x, box.min.y, center.z);
      scene.add(groundGrid);

      const fovRad = (cam.fov * Math.PI) / 180;
      const radius = maxD * 0.55;
      const dist = Math.max((radius / Math.tan(fovRad / 2)) * 1.45, maxD * 1.2);
      orbit.target.copy(center);
      cam.position.set(
        center.x + dist * 0.62,
        center.y + dist * 0.34,
        center.z + dist * 0.62,
      );
      cam.near = 0.01;
      cam.far = Math.max(maxD * 120, 25);
      cam.updateProjectionMatrix();
      orbit.minDistance = Math.max(maxD * 0.055, 0.045);
      orbit.maxDistance = Math.max(maxD * 40, 12);
      orbit.maxPolarAngle = Math.PI * 0.92;
      orbit.update();

      vLabel.textContent = "SO-101";
      resize();
      if (typeof window.syncUrdfMotors === "function") {
        const m = window.getDemoMotors ? window.getDemoMotors() : [0, 0, 0, 0, 0, 5];
        window.syncUrdfMotors(m);
      }
    }

    requestAnimationFrame(fitCameraToRobot);
  },
  undefined,
  (err) => {
    console.error("[SO-101 URDF]", err);
    vLabel.textContent = "Mesh load failed — check network / CORS";
  },
);

function resize() {
  const el = canvas.parentElement;
  const w = el.clientWidth;
  const h = el.clientHeight;
  if (w < 2 || h < 2) {
    requestAnimationFrame(resize);
    return;
  }
  renderer.setSize(w, h, false);
  cam.aspect = w / h;
  cam.updateProjectionMatrix();
}
new ResizeObserver(resize).observe(document.getElementById("viewer"));
window.addEventListener("load", resize);
resize();

(function loop() {
  requestAnimationFrame(loop);
  orbit.update();
  renderer.render(scene, cam);
})();
</script>
</body>
</html>
