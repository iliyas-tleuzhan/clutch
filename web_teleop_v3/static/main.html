<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ultimate Robot arm Manipulation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.79/build/spline-viewer.js"></script>
  <style>
    :root { --bg: #c8bfb3; --text: #ffffff; --line: rgba(255,255,255,0.3); }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      margin: 0;
      background: radial-gradient(1200px 600px at 50% 95%, #9f9484 0%, #c8bfb3 42%, #bcae9f 100%);
      color: var(--text);
      font-family: "Inter", sans-serif;
      position: relative;
    }
    spline-viewer {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    .wordmark {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 2;
    }
    .wordmark h1 {
      margin: 0;
      font-family: "Unbounded", sans-serif;
      font-weight: 900;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      font-size: clamp(72px, 16vw, 220px);
      color: rgba(255,255,255,0.92);
      text-shadow: 0 20px 48px rgba(50, 40, 25, 0.18);
    }
    .dock {
      position: fixed;
      left: 50%;
      bottom: 34px;
      transform: translateX(-50%);
      width: min(680px, 92vw);
      z-index: 4;
      background: rgba(12, 12, 12, 0.32);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 22px 52px rgba(0, 0, 0, 0.18);
    }
    .title {
      font-family: "Unbounded", sans-serif;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.95);
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      margin-bottom: 12px;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    button {
      width: 100%;
      text-align: center;
      border: 1px solid var(--line);
      background: rgba(10, 10, 10, 0.32);
      color: var(--text);
      padding: 13px 14px;
      border-radius: 10px;
      font-size: 11px;
      font-family: "Unbounded", sans-serif;
      font-weight: 700;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 120ms ease, border-color 120ms ease, color 120ms ease, background 120ms ease;
    }
    button:hover {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.95);
      color: #fff;
      background: rgba(6, 6, 6, 0.48);
    }
    .primary {
      border-color: rgba(255,255,255,0.95);
      color: #fff;
      background: rgba(15, 15, 15, 0.48);
    }
    .hint {
      margin-top: 10px;
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      text-align: center;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    #badge-cover {
      position: fixed;
      bottom: 8px;
      right: 8px;
      width: 210px;
      height: 48px;
      background: #c8bfb3;
      z-index: 5;
      pointer-events: none;
    }
    @media (max-width: 780px) {
      .buttons { grid-template-columns: 1fr; }
      .dock { bottom: 16px; }
      .wordmark h1 { font-size: clamp(56px, 22vw, 112px); }
    }
  </style>
</head>
<body>
  <spline-viewer url="/static/scene.spline" background="transparent" events-target="global" hide-logo></spline-viewer>
  <div class="wordmark"><h1>CLUTCH</h1></div>
  <main class="dock">
    <div class="title">Ultimate Robot arm Manipulation</div>
    <div class="subtitle">Select a module to open.</div>
    <div class="buttons">
      <button class="primary" id="btn-hand">hand tracking manipulation</button>
      <button id="btn-voice">voice manipulation</button>
      <button id="btn-work">work on tis jiggas</button>
    </div>
    <div class="hint">Only hand tracking is wired right now.</div>
  </main>
  <div id="badge-cover"></div>
  <script>
    document.getElementById("btn-hand").addEventListener("click", () => {
      window.location.href = "/hand-tracking-manipulation";
    });
    function notReady() {
      window.alert("This button is not wired yet.");
    }
    document.getElementById("btn-voice").addEventListener("click", notReady);
    document.getElementById("btn-work").addEventListener("click", notReady);
  </script>
</body>
</html>
