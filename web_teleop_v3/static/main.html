<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ultimate Robot arm Manipulation</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --line: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22c55e;
      --disabled: #475569;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1e293b, var(--bg) 60%);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .wrap {
      width: min(680px, 92vw);
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 18px 46px rgba(2, 6, 23, 0.45);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 3.5vw, 34px);
    }
    p {
      margin: 0 0 24px;
      color: var(--muted);
    }
    .buttons {
      display: grid;
      gap: 12px;
    }
    button {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: #0b1220;
      color: var(--text);
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
    }
    button:hover {
      transform: translateY(-1px);
      border-color: #60a5fa;
      background: #0f1a2d;
    }
    .primary {
      border-color: #16a34a;
      background: linear-gradient(180deg, #15803d, #166534);
      font-weight: 600;
    }
    .primary:hover {
      border-color: #4ade80;
      background: linear-gradient(180deg, #16a34a, #15803d);
    }
    .disabled {
      border-color: var(--disabled);
      color: #cbd5e1;
      background: #1f2937;
    }
    .hint {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Ultimate Robot arm Manipulation</h1>
    <p>Select a module to open.</p>
    <div class="buttons">
      <button class="primary" id="btn-hand">hand tracking manipulation</button>
      <button class="disabled" id="btn-voice">voice manipulation</button>
      <button class="disabled" id="btn-work">work on tis jiggas</button>
    </div>
    <div class="hint">Only hand tracking is wired right now.</div>
  </main>
  <script>
    document.getElementById("btn-hand").addEventListener("click", () => {
      window.location.href = "/hand-tracking-manipulation";
    });
    function notReady() {
      window.alert("This button is not wired yet.");
    }
    document.getElementById("btn-voice").addEventListener("click", notReady);
    document.getElementById("btn-work").addEventListener("click", notReady);
  </script>
</body>
</html>
